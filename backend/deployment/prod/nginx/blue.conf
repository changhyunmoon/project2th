limit_req_zone $binary_remote_addr zone=api_general:10m rate=50r/s;

# backend_blue이라고 부르면 127.0.0.1:8081을 뜻한다는 내용이다.
upstream backend_blue {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    listen [::]:80;
    server_name 43.202.182.58; # 현재 EC2의 공인 IP

    client_max_body_size 500M;
    access_log /var/log/nginx/access.log;

    # 모든 요청을 blue로 전달
    location / {
        proxy_pass http://backend_green;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 헬스체크 경로
    location /actuator/health {
        proxy_pass http://backend_green/actuator/health;
        access_log off;
    }
}