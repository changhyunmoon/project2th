spring:
  config:
    import: "optional:classpath:/application-prod.yml"

  profiles:
    active: local
    group:
      production-set1:
        - common
        - prod-db
        - port-9001
      production-set2:
        - common
        - prod-db
        - port-9002
---
# 공통 설정 (Actuator, JPA 기본 등)
spring:
  config:
    activate:
      on-profile: common
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      base-path: /api/actuator