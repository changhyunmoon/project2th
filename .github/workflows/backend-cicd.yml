name: Backend Blue-Green CI/CD

on:
  push:
    #main 브랜치에 코드가 들어왔을 때 작동
    branches: [ "main" ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  ###########################################################################################
  # 빌드 단계
  build:
    #우분투 환경의 가상 컴퓨터 대여
    runs-on: ubuntu-latest

    #이제부터 순서대로 할 일
    steps:
      #현재 내 깃허브 코드를 이 가상 컴퓨터로 가져옴
      - uses: actions/checkout@v4
      #자바 21환경을 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          #빌드 속도를 높이기 위해 필요한 라이브러리 캐싱
          cache: gradle

      # Secrets에 저장한 application-prod.properties 복원
      # 보안상 배포에 사용할 properties 파일을 직접 올리지 않고 github에서 관리
      - name: Make application-prod.yml
        run: |
          mkdir -p backend/src/main/resources
          #저장된 .properties 파일 복원
          echo "${{ secrets.APPLICATION_PROD }}" > backend/src/main/resources/application-prod.yml

      #자바 코드를 실행 가능한 파일(.jar) 로 컴파일
      - name: Build with Gradle
        working-directory: ./backend
        run: |
          #실행 권한 부여
           chmod +x gradlew
           #테스트 생략하고 빌드
           ./gradlew clean build -x test

      # Docker Hub 로그인 및 이미지 푸시
      #우선 도커 허브에 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 내 서버를 통쨰로 담은 이미지 생성
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{secrets.BACKEND_IMAGE_NAME}}:${{ secrets.BACKEND_IMAGE_TAG }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{secrets.BACKEND_IMAGE_NAME}}:${{ secrets.BACKEND_IMAGE_TAG }}

  ###########################################################################################
  deploy:
    needs: build # 빌드 단계가 성공해야만 실행됩니다.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deployment files to EC2 # 1. 배포에 필요한 스크립트 파일들을 EC2로 전송합니다.
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}      # EC2 IP 주소
          username: ${{ secrets.EC2_USER }}  # 접속 계정 (ubuntu 등)
          key: ${{ secrets.EC2_SSH_KEY }}    # .pem 키 내용
          source: "backend/deployment/**"       # 내 프로젝트의 이 폴더 내용들을
          target: "/home/ubuntu/deployment/backend"        # EC2의 이 경로로 보냅니다.
          strip_components: 2                # 전송 시 앞의 경로(deployment/backend)는 떼고 파일만 보냅니다.
          overwrite: true

      - name: Deploy to EC2 # 2. SSH로 EC2에 직접 접속해서 명령어를 실행합니다.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            
            # 1. 작업 디렉토리 절대 경로 설정
            BE_DIR="/home/ubuntu/deployment/backend"
            
            # 2. 폴더 생성 및 이동 (권한 설정 포함)
            sudo mkdir -p $BE_DIR/docker $BE_DIR/nginx
            sudo chown -R ubuntu:ubuntu $BE_DIR
            cd $BE_DIR
            
            # 1. .env 파일을 'docker' 폴더 안에 생성
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > ./docker/.env
            echo "BACKEND_IMAGE_NAME=${{ secrets.BACKEND_IMAGE_NAME }}" >> ./docker/.env
            echo "BACKEND_IMAGE_TAG=${{ secrets.BACKEND_IMAGE_TAG }}" >> ./docker/.env
            echo "${{ secrets.ENV_PROD }}" >> ./docker/.env
            
            # 2. 파일이 잘 생성되었는지 리스트를 출력해 확인합니다.!
            echo "Checking .env file location:"
            ls -al ./docker/.env
            
            # 3. 배포 스크립트(deploy.sh)에 실행 권한을 주고 실행합니다. 
            chmod +x deploy.sh

            sudo ./deploy.sh 
