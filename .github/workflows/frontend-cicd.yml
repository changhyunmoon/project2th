name: Frontend CI/CD

on:
  push:
    #main 브랜치에 코드가 들어왔을 때 작동
    branches: [ "main" ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

###############################################################
jobs:
  # 빌드 단계
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 노드 환경 설치 및 캐싱
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # 의존성 설치 및 빌드 테스트 (선택 사항이나 권장)
      - name: Install and Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 프론트엔드 이미지 빌드 및 푸시
      # Secrets에 FE_IMAGE_NAME 등을 추가하거나 직접 기입하세요.
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.FRONTEND_IMAGE_NAME }}:${{ secrets.FRONTEND_IMAGE_TAG }} ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.FRONTEND_IMAGE_NAME }}:${{ secrets.FRONTEND_IMAGE_TAG }}

###############################################################
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 프론트엔드용 배포 스크립트가 들어있는 경로
          source: "frontend/deployment/**"
          target: "/home/ubuntu/deployment/frontend"
          strip_components: 2
          overwrite: true

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 프론트엔드 작업 디렉토리 설정
            FE_DIR="/home/ubuntu/deployment/frontend"
            
            # 2. 폴더 생성 및 권한 부여 (docker 폴더 포함)
            sudo mkdir -p $FE_DIR/docker $FE_DIR/nginx
            sudo chown -R ubuntu:ubuntu $FE_DIR
            cd $FE_DIR
            
            # .env 파일 생성 (포트 번호 등을 관리)
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > ./docker/.env
            echo "FRONTEND_IMAGE_NAME=${{ secrets.FRONTEND_IMAGE_NAME }}" >> ./docker/.env
            echo "FRONTEND_IMAGE_TAG=${{ secrets.FRONTEND_IMAGE_TAG }}" >> ./docker/.env
            
            # 4. 파일 생성 확인 
            echo "Checking Frontend .env location:"
            ls -al $FE_DIR/docker/.env
            
            # 배포 스크립트 실행
            chmod +x deploy.sh
            sudo ./deploy.sh
          
          
          
          
          
          
          
          
          
          
          
